<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FitTrack</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://sdk.scdn.co/spotify-player.js"></script>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="screen active">
    <div class="card">
      <h1>FitTrack</h1>
      <p>Sign in to continue</p>
      <form id="login-form">
        <input type="text" id="username" placeholder="Username" required autocomplete="off">
        <input type="password" id="password" placeholder="Password" required autocomplete="off">
        <button type="submit">Sign In</button>
      </form>
      <p class="small">Demo: any username + password works (stored locally)</p>
    </div>
  </div>

  <!-- Main Dashboard -->
  <div id="main-screen" class="screen">
    <header>
      <h1>FitTrack</h1>
      <button id="logout">Logout</button>
    </header>

    <div class="dashboard">
      <div class="card stats">
        <div>
          <span class="label">Current Weight</span>
          <span id="current-wt-display" class="value">-- kg</span>
        </div>
        <div>
          <span class="label">BMI</span>
          <span id="bmi-display" class="value">--</span>
        </div>
        <div>
          <span class="label">Next Target</span>
          <span id="next-target-display" class="value">-- kg</span>
        </div>
      </div>

      <button id="to-settings">Settings</button>

      <!-- Weight Log -->
      <section>
        <h2>Log Weight</h2>
        <form id="weight-log-form">
          <input type="number" id="log-weight" placeholder="Weight (kg)" min="30" step="0.1" required>
          <button type="submit">Log</button>
        </form>
        <div id="weight-history"></div>
        <canvas id="bmi-chart" height="180"></canvas>
      </section>

      <!-- Routine & Workout -->
      <section>
        <h2>Routine</h2>
        <div id="routine-output"></div>
        <button id="start-workout">Start Workout</button>
        <div id="workout-hud" style="display:none">
          <h3>Session</h3>
          <div id="timer-display">00:00</div>
          <div id="speed-prompt">Ready...</div>
          <div id="phase">Warm-up</div>
          <div class="btn-group">
            <button id="pause-workout">Pause</button>
            <button id="stop-workout">Finish</button>
          </div>
        </div>
      </section>

      <!-- Daily Check -->
      <section>
        <h2>Daily Progress</h2>
        <div id="daily-log" class="daily-grid"></div>
      </section>

      <!-- Music -->
      <section class="music-cards">
        <div class="music-card spotify">
          <div class="icon">Spotify</div>
          <button id="connect-spotify">Connect</button>
          <label><input type="checkbox" id="autoplay-spotify" checked> Auto-play</label>
          <select id="playlist-select"><option>Select playlist...</option></select>
          <button id="play-playlist" disabled>Play</button>
        </div>

        <div class="music-card youtube">
          <div class="icon">YouTube Music</div>
          <input type="text" id="youtube-url" placeholder="Playlist / Video URL">
          <button id="load-youtube">Load</button>
          <label><input type="checkbox" id="autoplay-youtube" checked> Auto-play</label>
          <div id="youtube-player" style="display:none"></div>
        </div>
      </section>
    </div>
  </div>

  <!-- Settings Screen -->
  <div id="settings-screen" class="screen">
    <div class="card">
      <h2>Settings</h2>
      <form id="settings-form">
        <label>Sex <select id="sex-s"><option>male</option><option>female</option><option>other</option></select></label>
        <label>Age <input type="number" id="age-s" min="18"></label>
        <label>Height (cm) <input type="number" id="height-s" min="100"></label>
        <label>Current Weight (kg) <input type="number" id="current-weight-s" min="30" step="0.1"></label>
        <label>Target Weight (kg) <input type="number" id="target-weight-s" min="30" step="0.1"></label>
        <label>Fitness Level <select id="fitness-level-s"><option>low</option><option>medium</option><option>high</option></select></label>
        <button type="submit">Save Changes</button>
      </form>
      <button id="back-to-main">Back to Dashboard</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
