<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Treadmill</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>FitTrack Treadmill</h1>
            <p>Your modern funky fitness companion! Track weight, crush BMI goals, and treadmill like a pro. 🚀</p>
        </header>

        <section id="profile-section">
            <h2>Setup Your Profile</h2>
            <form id="profile-form">
                <label>Sex: <select id="sex"><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option></select></label>
                <label>Age: <input type="number" id="age" min="18" required></label>
                <label>Height (cm): <input type="number" id="height" min="100" required></label>
                <label>Current Weight (kg): <input type="number" id="current-weight" min="30" required></label>
                <label>Target Weight (kg): <input type="number" id="target-weight" min="30" required></label>
                <label>Fitness Level: <select id="fitness-level"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></label>
                <button type="submit">Save Profile</button>
            </form>
            <div id="monthly-target"></div>
        </section>

        <section id="weight-log-section">
            <h2>Weekly Weight Log</h2>
            <form id="weight-log-form">
                <label>Weight (kg): <input type="number" id="log-weight" min="30" required></label>
                <button type="submit">Log Weight</button>
            </form>
            <div id="weight-history"></div>
            <canvas id="bmi-chart" width="400" height="200"></canvas>
        </section>

        <section id="routine-section">
            <h2>Your Treadmill Routine</h2>
            <div id="routine-output"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
