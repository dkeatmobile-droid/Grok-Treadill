<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FitTrack</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <img src="./logo.jpg.png" alt="FitTrack Logo" class="app-logo">
      <h1>FitTrack</h1>
    </header>

    <section>
      <h2 class="collapsible" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('show')">
        Profile <span class="toggle-icon">▼</span>
      </h2>
      <div class="content">
        <form id="profile-form">
          <label>Sex <select id="sex"><option>male</option><option>female</option><option>other</option></select></label>
          <label>Age <input type="number" id="age" min="18" required></label>
          <label>Height (cm) <input type="number" id="height" min="100" required></label>
          <label>Weight (kg) <input type="number" id="current-weight" min="30" required></label>
          <label>Target (kg) <input type="number" id="target-weight" min="30" required></label>
          <label>Level <select id="fitness-level"><option>low</option><option>medium</option><option>high</option></select></label>
          <button type="submit">Save Profile</button>
        </form>
        <div id="monthly-target"></div>
      </div>
    </section>

    <section>
      <h2 class="collapsible" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('show')">
        Weight Log <span class="toggle-icon">▼</span>
      </h2>
      <div class="content">
        <form id="weight-log-form">
          <label>Weight (kg) <input type="number" id="log-weight" min="30" required></label>
          <button type="submit">Log</button>
        </form>
        <div id="weight-history" class="table-container"></div>
        <canvas id="bmi-chart"></canvas>
      </div>
    </section>

    <section>
      <h2>Workout Calendar & Progress</h2>
      
      <div style="margin-bottom:20px;text-align:center">
        <label>Start Date: 
          <input type="date" id="start-date" required>
          <button id="set-start-date">Set / Reset</button>
        </label>
      </div>
      
      <div id="calendar-container"></div>
      <p id="progress-info" style="text-align:center;font-size:1.1rem;color:#94a3b8;margin-top:16px;">No start date set yet.</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
